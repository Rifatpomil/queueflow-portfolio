name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Backend lint + typecheck ──────────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff black mypy
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check app tests

      - name: Black format check
        run: black --check app tests

      - name: Mypy typecheck
        run: mypy app --ignore-missing-imports --no-error-summary

  # ── Backend unit tests ────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        env:
          APP_ENV: test
          JWT_SECRET_KEY: test-secret-key-for-ci-only
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          DATABASE_SYNC_URL: "sqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          CELERY_BROKER_URL: "redis://localhost:6379/1"
          CELERY_RESULT_BACKEND: "redis://localhost:6379/2"
        run: pytest tests/unit/ -v --tb=short

  # ── Backend integration tests ─────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: queueflow_test
          POSTGRES_PASSWORD: queueflow_test_secret
          POSTGRES_DB: queueflow_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Alembic migrations
        env:
          DATABASE_SYNC_URL: postgresql+psycopg2://queueflow_test:queueflow_test_secret@localhost:5432/queueflow_test
        run: alembic upgrade head

      - name: Run integration tests
        env:
          APP_ENV: test
          JWT_SECRET_KEY: test-secret-key-for-ci-only
          DATABASE_URL: postgresql+asyncpg://queueflow_test:queueflow_test_secret@localhost:5432/queueflow_test
          DATABASE_SYNC_URL: postgresql+psycopg2://queueflow_test:queueflow_test_secret@localhost:5432/queueflow_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          AUTH_MODE: dev
          RATE_LIMIT_ENABLED: "false"
          RLS_ENABLED: "false"
          OTEL_ENABLED: "false"
        run: pytest tests/integration/ -v --tb=short

  # ── Frontend build check ──────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
